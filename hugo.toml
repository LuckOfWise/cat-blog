baseURL = "https://www.ramune-diary.com/"
languageCode = "ja-jp"
title = "ラムネの日々"
theme = "ananke"
canonifyURLs = true
defaultContentLanguage = "ja"
defaultContentLanguageInSubdir = false

[languages]
  [languages.ja]
    languageName = "日本語"
    weight = 1
    title = "ラムネの日々"
    [languages.ja.params]
      description = "オフィス猫ラムネの可愛い日常を写真で綴るブログ。毎日のお昼寝、探検、おやつの時間など、愛らしい猫の日々をお楽しみください。"
  [languages.en]
    languageName = "English"
    weight = 2
    title = "Everyday Ramune"
    contentDir = "content/en"
    [languages.en.params]
      description = "Ramune is an office cat in Tokyo. Daily naps, curious eyes, and fluffy moments — translated highlights from the Japanese blog."

[params]
  mainSections = ["posts"]
  background_color_class = "bg-light-orange"
  text_color_class = "dark-gray"
  description = "オフィス猫ラムネの可愛い日常を写真で綴るブログ。毎日のお昼寝、探検、おやつの時間など、愛らしい猫の日々をお楽しみください。"
  favicon = "/favicon.ico"
  custom_css = []

  # Monetization (フェーズ2で有効化、空文字列なら無効)
  amazon_associate_tag = ""        # 例: "ramunediary-22"
  adsense_publisher_id = ""        # 例: "ca-pub-XXXXXXXXXXXXXXXX"
  google_analytics_id = ""         # 例: "G-XXXXXXXXXX"

  # SNS
  instagram_account = "everyday_ramune"
  
[params.ananke]
  show_recent_posts = true

[params.ananke.social.share]
icons = true
sharetext = true
networks = ["x-twitter"]
  
paginate = 30

# Navigation Menu
[[menu.main]]
  name = "投稿一覧"
  url = "/posts/"
  weight = 10

[[menu.main]]
  name = "タグ一覧"
  url = "/tags/"
  weight = 20

[[menu.main]]
  name = "アーカイブ"
  url = "/archive/"
  weight = 25

[[menu.main]]
  name = "ラムネについて"
  url = "/about/"
  weight = 30

[[menu.main]]
  name = "お問い合わせ"
  url = "/contact/"
  weight = 40

# SEO Settings
enableRobotsTXT = true
enableGitInfo = true

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

# Related Content
[related]
  includeNewer = true
  threshold = 80
  toLower = false
  
  [[related.indices]]
    name = "tags"
    weight = 100
    
  [[related.indices]]
    name = "date"
    weight = 10
